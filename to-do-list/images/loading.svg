<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .loader-ring {
        animation: spin 2s linear infinite;
        transform-origin: 50px 50px;
      }
      .loader-dot {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Outer rotating circle -->
  <g class="loader-ring">
    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round" stroke-dasharray="130 260"/>
  </g>
  
  <!-- Middle pulsing circle -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ff6e53" stroke-width="2" opacity="0.4" class="loader-dot"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#ff6e53"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2a6d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4e0860;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6e53;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
